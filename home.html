<head>
    <title>
        ASO - Your All In One Startup Coach
    </title>
    <link rel="stylesheet" href="style.css"/>
    <link rel="script" href="script.js"/>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
    </style>
</head>

<body>
    <div class="home">
        <div class="speaking">
            <div class="home_heading">
                <h1>ASO</h1>
                <img src="icons/settings_white.png">
            </div>
            <div class="home_speaking_indication">
                <div class= "bar bar1"></div>
                <div class= "bar bar2"></div>
                <div class= "bar bar3"></div>
                <div class= "bar bar4"></div>
                <div class= "bar bar5"></div>
                <div class= "bar bar6"></div>
                <div class= "bar bar7"></div>
            </div>
            <div class="incoming_speech">
                <textarea id="current_speech"></textarea>
                <button class="confirm_speech" id="confirm_speech">confirm</button>
            </div>

            <button class="control_session" id="control_session">start session</button>
        </div>

        <div class="transcription">
            <div class="transcription_heading">
                <h1>Transcript</h1>
            </div>
            <div class="transcription_content">
                <p id="content">
                </p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
